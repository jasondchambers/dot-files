# Move windows within tiling layout
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d

# Screenshot
bind = $mainMod SHIFT, P, exec, grim -g "$(slurp)" ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png

# Application bindings
#bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" tmux new
bind = $mainMod, RETURN, exec, $terminal #bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"

bind = $mainMod SHIFT, B, exec, firefox #bindd = SUPER SHIFT, RETURN, Browser, exec, omarchy-launch-browser
bind = $mainMod SHIFT, F, exec, $fileManager #bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bind = $mainMod SHIFT, O, exec, obsidian #bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus ^obsidian$ "uwsm-app -- obsidian -disable-gpu --enable-wayland-ime"
