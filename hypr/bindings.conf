bind = $mainMod SHIFT, S, exec, firefox "https://app.slack.com/client/T6SPCTC8L/C08NT9310RE" #bindd = SUPER SHIFT, S, Slack, exec, omarchy-launch-webapp "https://app.slack.com/client/T6SPCTC8L/C08NT9310RE"
